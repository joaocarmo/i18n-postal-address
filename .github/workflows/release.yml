name: Release Version

on:
  release:
    types: [created]

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          ref: 'main'

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump the version
        run: |
          git config --local user.name "${{ secrets.GIT_AUTHOR_NAME }}"
          git config --local user.email "${{ secrets.GIT_AUTHOR_EMAIL }}"
          npm version --no-commit-hooks --no-git-tag-version ${{ github.event.release.tag_name }}

      - name: Commit and push the version change
        run: |
          git add .
          git commit -m "Release ${{ github.event.release.tag_name }}" --no-gpg-sign --no-verify --signoff
          git push

      - name: Trigger the Publish Action
        uses: benc-uk/workflow-dispatch@v1.3.1
        with:
          workflow: Publish
          token: ${{ secrets.GH_PAT }}
